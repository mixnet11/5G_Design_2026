<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="refresh" content="2; url=$(link-status)">
  <title>تم تسجيل الدخول | 5G Hotspot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
    :root{
      --bg1:#020311; --bg2:#070A1E;
      --card1: rgba(10,12,34,.90); --card2: rgba(10,12,34,.62);
      --pearl: rgba(252,251,255,.97); --muted: rgba(232,229,248,.80);
      --gold1:#8E5F10; --gold2:#FFF2D1; --gold3:#F0C772;
      --r:28px; --shadow:0 18px 70px rgba(0,0,0,.70);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Cairo",system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--pearl);
      background:
        radial-gradient(1200px 650px at 18% 10%, rgba(183,166,255,.11), transparent 60%),
        radial-gradient(1050px 650px at 84% 28%, rgba(240,199,114,.12), transparent 62%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.030) 0 1px, transparent 1px 46px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.024) 0 1px, transparent 1px 46px),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:flex; align-items:center; justify-content:center;
      padding:16px;
      overflow-x:hidden;
      position:relative;
    }
    body:after{
      content:"";
      position:fixed; inset:0;
      background:
        repeating-radial-gradient(circle at 15% 25%, rgba(255,255,255,.016) 0 1px, transparent 1px 7px),
        repeating-radial-gradient(circle at 75% 65%, rgba(255,255,255,.012) 0 1px, transparent 1px 8px);
      opacity:.55; pointer-events:none;
    }

    .wrap{width:100%; max-width:520px; position:relative; padding-top:52px;}
    .logoDock{position:absolute; top:0; left:0; right:0; display:flex; justify-content:center; pointer-events:none; z-index:10;}

    .goldText{
      background: linear-gradient(90deg, var(--gold2), #FFE8B3, var(--gold3), var(--gold1));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 18px 48px rgba(0,0,0,.58), 0 0 26px rgba(240,199,114,.12);
    }

    .logoCircle{
      pointer-events:auto; width:96px; height:96px; border-radius:50%;
      position:relative; overflow:hidden; transform:translateY(18px);
      display:flex; align-items:center; justify-content:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 26px 75px rgba(0,0,0,.68);
      animation: floaty 4.2s ease-in-out infinite;
      -webkit-tap-highlight-color:transparent;
    }
    .logoCircle:before{
      content:""; position:absolute; inset:-12px; border-radius:50%;
      background:
        radial-gradient(circle at 28% 28%, rgba(255,242,209,.55), transparent 42%),
        radial-gradient(circle at 72% 66%, rgba(240,199,114,.42), transparent 50%),
        radial-gradient(circle at 50% 10%, rgba(183,166,255,.22), transparent 58%);
      filter:blur(10px); opacity:.82; pointer-events:none;
    }
    .logoCircle:after{
      content:""; position:absolute; inset:0; border-radius:50%;
      background: linear-gradient(135deg, rgba(255,242,209,.20), rgba(240,199,114,.16), rgba(183,166,255,.12));
      opacity:.95; pointer-events:none;
      box-shadow: inset 0 0 0 1px rgba(255,242,209,.08);
    }
    .logoGlass{
      position:absolute; inset:7px; border-radius:50%;
      background: radial-gradient(circle at 25% 20%, rgba(255,255,255,.20), transparent 52%), rgba(255,255,255,.03);
      box-shadow: inset 0 0 0 1px rgba(240,199,114,.22), inset 0 -12px 22px rgba(0,0,0,.34);
      pointer-events:none; z-index:2;
    }
    .logoMark{
      position:relative; z-index:3; font-weight:1000; letter-spacing:.5px; font-size:34px; line-height:1;
      filter: drop-shadow(0 16px 30px rgba(0,0,0,.60)); user-select:none;
    }
    @keyframes floaty{0%,100%{ transform:translateY(18px);} 50%{transform:translateY(12px);} }

    .portal{
      position:relative; border-radius:var(--r); padding:18px; padding-top:70px;
      background: linear-gradient(180deg, var(--card1), var(--card2));
      box-shadow:var(--shadow); overflow:hidden; border:1px solid rgba(255,255,255,.075);
      -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
      transition: transform .18s ease;
    }
    .portal:before{
      content:""; position:absolute; inset:0; border-radius:var(--r); pointer-events:none; opacity:.85;
      box-shadow: inset 0 0 0 1px rgba(255,242,209,.18);
    }
    .ambient{
      position:absolute; inset:-120px;
      background:
        radial-gradient(520px 260px at 20% 22%, rgba(255,242,209,.09), transparent 62%),
        radial-gradient(520px 300px at 82% 28%, rgba(183,166,255,.10), transparent 68%),
        radial-gradient(520px 320px at 35% 86%, rgba(240,199,114,.12), transparent 72%);
      filter: blur(2px); opacity:.95; animation: ambientMove 8s ease-in-out infinite; pointer-events:none; z-index:0;
    }
    @keyframes ambientMove{0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(10px,-8px) scale(1.02)}}
    @keyframes portalFloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)}}
    .touchFloat{animation: portalFloat 6.5s ease-in-out infinite;}

    .inner{position:relative; z-index:1;}
    .brandGold{margin:0 0 12px; text-align:center; font-weight:1000; font-size:24px; letter-spacing:.8px;}
    
    .btn{
      width:100%; border-radius:999px; padding:15px 16px; cursor:pointer; font-weight:1000; font-size:19px; line-height:1.15;
      color: var(--gold3); background: rgba(255,255,255,.06); border:1px solid rgba(240,199,114,.26);
      box-shadow:0 16px 0 rgba(0,0,0,.22), 0 34px 78px rgba(0,0,0,.56);
      text-decoration:none; display:block; text-align:center; -webkit-tap-highlight-color:transparent;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      position:relative; overflow:hidden; user-select:none;
      margin-top: 18px;
    }
    .btn:active{transform: translateY(10px) scale(.988); background: rgba(240,199,114,.10); border-color: rgba(255,242,209,.55);}

    .mutedTxt{color:var(--muted); font-size:14px; line-height:1.9; margin-bottom:20px; text-align:center;}
    .stamp{margin-top:16px; text-align:center; font-size:11px; letter-spacing:.5px; opacity:.88;}

    .ripple{
      position:absolute; width:10px; height:10px; border-radius:50%; pointer-events:none; opacity:.70;
      background: radial-gradient(circle, rgba(255,255,255,.52) 0%, rgba(255,242,209,.28) 38%, rgba(240,199,114,.16) 70%, transparent 72%);
      transform: translate(-50%,-50%) scale(1); animation: ripple 520ms forwards; z-index:99;
    }
    @keyframes ripple{0%{transform:translate(-50%,-50%) scale(.2); opacity:.78;} 60%{opacity:.28;} 100%{transform:translate(-50%,-50%) scale(18); opacity:0;}}

    @media (prefers-reduced-motion: reduce){ .portal,.ambient,.logoCircle{transition:none; animation:none;} }
  </style>
  <script language="JavaScript">
  function startClock() {
      $(if popup == 'true')
      open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
      $(endif)
      location.href = '$(link-status)';
  }
  // Visuals & Ripples
  function getClosestWithRipple(node){
    while(node && node !== document){
      if(node.getAttribute && node.getAttribute('data-ripple') === '1'){ return node; }
      node = node.parentNode;
    }
    return null;
  }
  function addRipple(e){
    var target = getClosestWithRipple(e.target || e.srcElement);
    if(!target){ return; }
    var rect = target.getBoundingClientRect();
    var x = rect.width / 2;
    var y = rect.height / 2;
    if(typeof e.clientX === 'number'){ x = e.clientX - rect.left; }
    if(typeof e.clientY === 'number'){ y = e.clientY - rect.top; }
    var r = document.createElement('span');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    target.appendChild(r);
    setTimeout(function(){ if(r && r.parentNode){ r.parentNode.removeChild(r); } }, 650);
  }
  if(document.addEventListener){ document.addEventListener('click', addRipple, false); }
  </script>
</head>
<body onLoad="startClock()">
  <div class="wrap">
    <div class="logoDock">
      <div class="logoCircle" data-ripple="1" aria-label="5G Logo">
        <div class="logoMark goldText">5G</div>
        <div class="logoGlass"></div>
      </div>
    </div>

    <div class="portal" id="portal">
      <div class="ambient"></div>

      <div class="inner">
        <div class="brandGold goldText">تم تسجيل الدخول</div>
        <div class="mutedTxt">لقد تم تسجيل دخولك بنجاح، جاري تحويلك لحالة الاتصال...</div>
        
        <a href="$(link-status)" class="btn" data-ripple="1">عرض حالة الاتصال</a>
        <div class="stamp goldText">Design By Gamal Abd Elazim @2026</div>
      </div>
    </div>
  </div>
  <script>
    (function(){
      var portal = document.getElementById('portal');
      if(!portal){ return; }
      var coarse = false;
      try { coarse = window.matchMedia && window.matchMedia('(hover:none) and (pointer:coarse)').matches; } catch(e) { coarse = false; }
      if(coarse){ portal.className += ' touchFloat'; }
    })();
  </script>
</body>
</html>
